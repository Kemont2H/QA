# Называем workflow
name: pw test

# Когда запускать тесты
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Даем права на запись в репозиторий
permissions:
  contents: write
  pages: write
  id-token: write

# Сама джоба
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    # делаем чекаут основной ветки
    - uses: actions/checkout@v4
    
    # устанавливаем ноду
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    # установим зависимости
    - run: npm ci  # лучше использовать npm ci вместо npm i
    
    # устанавливаем PW
    - name: Install Playwright
      run: npx playwright install --with-deps
    
    # запускаем тесты
    - name: Run Playwright tests
      run: npm run test
    
    # сохраняем отчет playwright
    - uses: actions/upload-artifact@v4
      if: always()
      continue-on-error: true
      with:
        name: test-results
        path: test-results
        retention-days: 20
    
    # сохраняем отчет allure
    - uses: actions/upload-artifact@v4
      if: always()
      continue-on-error: true
      with:
        name: allure-results
        path: allure-results
        retention-days: 20
    
    # клонируем gh-pages ветку
    - uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages
        token: ${{ secrets.GITHUB_TOKEN }}
    
    # формируем отчет allure
    - uses: simple-elf/allure-report-action@master
      if: always()
      id: allure-report
      with:
        allure_results: allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history
        keep_reports: 20
    
    # деплоим отчет
    - name: Deploy report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./allure-history
        keep_files: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
